schema_version: "1"
agent_sets:
  - id: standard-agents
    name:
      en: Standard Agents
      zh-CN: 标准智能体
    description:
      en: Balanced planner, implementer, verifier, reviewer, and delivery roles for ordinary Codex work.
      zh-CN: 面向常规 Codex 工作的规划、实现、验证、评审和交付角色组合。
    agents:
      - id: planner
        role:
          en: Planner
          zh-CN: 规划者
        scope:
          en: Clarify goal, constraints, graph shape, risks, and acceptance.
          zh-CN: 澄清目标、约束、流程图、风险和验收标准。
      - id: coder
        role:
          en: Implementer
          zh-CN: 实现者
        scope:
          en: Apply scoped project changes and collect evidence.
          zh-CN: 执行限定范围内的项目改动并收集证据。
      - id: tester
        role:
          en: Verifier
          zh-CN: 验证者
        scope:
          en: Run focused checks, record outputs, and reject incomplete work.
          zh-CN: 运行聚焦检查、记录输出，并打回不完整交付。
      - id: reviewer
        role:
          en: Reviewer
          zh-CN: 评审者
        scope:
          en: Audit quality, omissions, risk, and delivery readiness.
          zh-CN: 审查质量、遗漏、风险和交付准备度。
      - id: delivery
        role:
          en: Delivery owner
          zh-CN: 交付负责人
        scope:
          en: Package final evidence, residual risk, and user-facing summary.
          zh-CN: 整理最终证据、剩余风险和面向用户的交付摘要。
  - id: ui-agents
    name:
      en: UI Agents
      zh-CN: UI 智能体
    description:
      en: Adds visual design and browser QA roles for frontend or interface-heavy work.
      zh-CN: 为前端或界面密集任务增加视觉设计和浏览器验收角色。
    agents:
      - id: ux-designer
        role:
          en: UX designer
          zh-CN: UX 设计者
        scope:
          en: Define information architecture, interaction states, and visual acceptance.
          zh-CN: 定义信息架构、交互状态和视觉验收标准。
      - id: frontend-coder
        role:
          en: Frontend implementer
          zh-CN: 前端实现者
        scope:
          en: Implement UI changes within the existing stack and design system.
          zh-CN: 在现有技术栈和设计系统内实现 UI 改动。
      - id: visual-qa
        role:
          en: Visual QA
          zh-CN: 视觉验收
        scope:
          en: Verify responsive layout, screenshots, interaction state, and accessibility basics.
          zh-CN: 验证响应式布局、截图、交互状态和基础可访问性。
  - id: orchestration-agents
    name:
      en: Orchestration Agents
      zh-CN: 编排智能体
    description:
      en: Roles for broad requirements that need insight, workstream routing, monitored execution, integration gates, and workflow learning.
      zh-CN: 面向复杂需求的角色组合，覆盖需求洞察、工作流路由、执行监听、集成验票和流程学习。
    agents:
      - id: demand-analyst
        role:
          en: Demand analyst
          zh-CN: 需求洞察者
        scope:
          en: Extract intent, constraints, success metrics, hidden risks, and required user decisions.
          zh-CN: 提炼意图、约束、成功指标、隐藏风险和必要用户决策。
      - id: workflow-architect
        role:
          en: Workflow architect
          zh-CN: 工作流架构师
        scope:
          en: Map workstreams to reusable templates, dependency edges, dispatch surfaces, and scorecards.
          zh-CN: 将工作流路由到可复用模板、依赖边、派发表面和 scorecard。
      - id: orchestrator
        role:
          en: Orchestrator observer
          zh-CN: 主控观察者
        scope:
          en: Monitor workflow state, assign bounded workers, integrate handoffs, and avoid main-thread drift.
          zh-CN: 监听 workflow 状态、分配有边界 worker、集成交接，并避免主线程漂移。
      - id: integrator
        role:
          en: Integration verifier
          zh-CN: 集成验票者
        scope:
          en: Verify cross-workstream evidence, reject incomplete handoffs, and guard against scope drift.
          zh-CN: 校验跨工作流证据、打回不完整交接，并防止范围漂移。
      - id: delivery
        role:
          en: Delivery owner
          zh-CN: 交付负责人
        scope:
          en: Package final evidence, residual risk, knowledge sync, and workflow evolution candidates.
          zh-CN: 汇总最终证据、剩余风险、知识同步和 workflow 进化候选。
  - id: deck-agents
    name:
      en: Deck Agents
      zh-CN: PPT 智能体
    description:
      en: Roles for PPT/deck work that needs source/template analysis, story, visual direction, slide production, feedback rework, export verification, and source-safe specialist selection.
      zh-CN: 面向 PPT/deck 工作的角色组合，覆盖源材料/模板分析、叙事、视觉方向、幻灯片生产、反馈返工、导出验证和来源安全的 specialist 选择。
    agents:
      - id: deck-strategist
        role:
          en: Deck strategist
          zh-CN: PPT 策略师
        scope:
          en: Clarify audience, objective, decision moment, narrative arc, constraints, and direction options.
          zh-CN: 澄清受众、目标、决策场景、叙事主线、约束和方向选项。
      - id: content-architect
        role:
          en: Content architect
          zh-CN: 内容架构师
        scope:
          en: Structure the storyline, section logic, slide outline, source mapping, and speaker-note needs.
          zh-CN: 组织故事线、章节逻辑、页面大纲、来源映射和演讲备注需求。
      - id: visual-director
        role:
          en: Visual director
          zh-CN: 视觉导演
        scope:
          en: Choose visual style, template strategy, asset needs, and same-lane deck specialist routing.
          zh-CN: 选择视觉风格、模板策略、资产需求和同类 PPT specialist 路由。
      - id: deck-builder
        role:
          en: Deck builder
          zh-CN: PPT 生成者
        scope:
          en: Build or revise deck artifacts with the selected primary production surface and bounded supporting tools.
          zh-CN: 使用选定的主生产面和有边界的支持工具生成或修改 PPT 产物。
      - id: deck-qa
        role:
          en: Deck QA
          zh-CN: PPT 验收者
        scope:
          en: Verify exports, editability or HTML behavior, rendering, structure, citations, and residual risk.
          zh-CN: 验证导出、可编辑性或 HTML 行为、渲染、结构、引用和剩余风险。
      - id: delivery
        role:
          en: Delivery owner
          zh-CN: 交付负责人
        scope:
          en: Package final artifacts, evidence, source-safety notes, and workflow evolution candidates.
          zh-CN: 汇总最终产物、证据、来源安全说明和 workflow 进化候选。
