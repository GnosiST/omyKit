name: Upstream Watch

on:
  schedule:
    - cron: "17 4 1 * *"
  workflow_dispatch:

jobs:
  upstream-watch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check tracked upstream references
        run: node ./scripts/check-upstream-refs.mjs --strict
