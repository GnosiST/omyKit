name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install validation dependencies
        run: python -m pip install PyYAML

      - name: Validate skills
        run: PYTHON=python ./scripts/validate-skills.sh

      - name: Validate docs
        run: node ./scripts/validate-docs.mjs

      - name: Validate workflow templates
        run: node ./scripts/omykit-workflow.mjs templates validate

      - name: Test workflow controller
        run: node ./scripts/test-omykit-workflow.mjs

      - name: Check whitespace
        run: git diff --check
